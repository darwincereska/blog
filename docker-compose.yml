services:
  # Postgres Database
  postgres:
    image: postgres:18-alpine
    container_name: blog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog
      POSTGRES_DB: blog
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql
    networks:
      - blog-network


  # Redis cache
  redis:
    image: redis:8.4-alpine
    container_name: blog-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --databases 16
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - blog-network

volumes:
  pg_data:
  redis_data:

networks:
  blog-network:
    driver: bridge

